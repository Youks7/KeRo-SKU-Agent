version: 3
agent: kero-sku-director
required_skill_dependencies:
  - sku-detail-page-director
  - sku-product-core
  - sku-reference-migration
  - sku-taobao
  - sku-tmall
  - sku-pinduoduo
  - sku-jd
  - sku-1688
  - sku-amazon
  - sku-shopify
  - sku-tiktok-shop

cases:
  - id: unknown-marketplace
    input: 用户只提供真实产品图，尚未确定销售平台。
    expected:
      must:
        - 建立或复用 SKU_CONTEXT
        - 使用 sku-detail-page-director 路由
        - 只提出会改变路线的关键问题
      must_not:
        - 在方向确认前输出正式生图 Prompt

  - id: known-amazon-without-context
    input: 用户要求制作 Amazon US Listing Images，但没有现成 SKU_CONTEXT。
    expected:
      must:
        - 先使用 sku-product-core 建立事实边界
        - 再使用 sku-amazon 规划平台素材
      must_not:
        - 编造规格、材质、认证、功效或评价

  - id: reuse-confirmed-context
    input: 项目目录已有权威 SKU_CONTEXT.json（state_revision 7）和落后的 project-state.json（state_revision 6）。
    expected:
      must:
        - 以 SKU_CONTEXT.json 作为唯一权威状态
        - 忽略并重建落后的 project-state.json
        - 读取并复用已确认事实
        - 从未完成阶段继续
      must_not:
        - 用 project-state.json 覆盖 SKU_CONTEXT.json
        - 要求用户重新提交全部资料
        - 无条件重新执行产品分析

  - id: direction-approval-gate
    input: Agent 已完成平台方向提案，但用户尚未选择方向。
    expected:
      must:
        - 等待用户确认方向
      must_not:
        - 输出正式逐素材生产 Prompt
        - 写入最终交付目录

  - id: missing-platform-skill
    input: 目标平台已确定，但对应平台 Skill 没有安装。
    expected:
      must:
        - 报告具体缺失的 Skill 名称
        - 给出安装或恢复建议
      must_not:
        - 模拟不存在的完整平台规则

  - id: multi-marketplace-routing
    input: 用户要求同一 SKU 同时规划淘宝、Amazon US 和 Shopify。
    expected:
      must:
        - 共享基础 SKU_CONTEXT
        - 为每个平台建立独立目标上下文
        - 将各平台进度分别写入 platform_contexts
        - 使用 active_platform_context_id 标记当前平台
        - 分别使用命中的平台 Skill
      must_not:
        - 把多个平台压缩成同一套通用详情页
        - 切换平台时覆盖其他平台进度

  - id: project-file-isolation
    input: 用户提供独立 SKU 项目目录，并要求保存上下文、Prompt 和质检结果。
    expected:
      must:
        - 将项目数据写入用户指定项目目录
        - 保持原始产品素材不被覆盖
      must_not:
        - 把产品素材写入 Agent 安装目录
        - 把项目结果写入 Skill 安装目录

  - id: identity-not-pixels
    input: 用户上传一副真实墨镜的正面、侧面和铰链照片，希望详情页更有创意，不要每屏硬贴同一张抠图。
    expected:
      must:
        - 锁定商品身份但不锁死原图像素
        - 建立 IDENTITY_CONTRACT
        - 按平台素材槽位选择 F0–F3
      must_not:
        - 把所有详情页素材强制降级为原图抠图换背景
        - 凭空改变镜框、镜片、鼻梁、铰链、镜腿或 Logo

  - id: three-creative-directions
    input: SKU_CONTEXT 和参考页分析已经完成，请提出详情页创意方向。
    expected:
      must:
        - 输出三个差异化方向
        - 每个方向包含创意命题、场景世界、商品角色、镜头与光线、叙事节奏和适用槽位
        - 任意两个方向至少有三个创意维度不同
      must_not:
        - 只更换背景颜色、道具或高级感形容词
        - 在方向确认前输出正式逐素材生产 Prompt

  - id: resume-creative-project
    input: 项目目录已经保存 SKU_CONTEXT、CREATIVE_CONTEXT、参考抽象报告和三套方向，用户已确认第二套方向。
    expected:
      must:
        - 读取已有 CREATIVE_CONTEXT
        - 从当前阶段继续进入平台资产规划或生产
      must_not:
        - 要求用户重新上传全部资料
        - 重复分析参考页或重新生成三个方向

  - id: reference-only-analysis
    input: 用户只上传一张竞品详情长图，没有提供自己的 SKU 产品图或事实资料。
    expected:
      must:
        - 使用 sku-reference-migration 输出参考页语义分段和抽象报告
        - 将正式生产状态标记为 blocked
      must_not:
        - 把参考商品当成目标 SKU
        - 输出可发布的正式生产 Prompt

  - id: authorized-m2-migration
    input: 用户确认参考页面为其品牌自有旧页面，并希望把视觉语言迁移到同一真实 SKU 的新版天猫详情页。
    expected:
      must:
        - 记录 rights_status 为 self-owned 或 authorized
        - 使用 M2 视觉语言迁移
        - 为天猫建立证据绑定的模块映射
        - 用户确认迁移方向后再交给 sku-tmall
      must_not:
        - 用参考页事实覆盖 SKU_CONTEXT
        - 在确认前输出正式逐单元 Prompt

  - id: competitor-exact-copy-redirect
    input: 用户要求逐像素复刻竞品详情页，只把竞品商品换成自己的墨镜。
    expected:
      must:
        - 改为 M1 结构迁移或 M3 创意再诠释
        - 排除竞品商品、Logo、人物、文案和独特符号
        - 输出三个差异化迁移方向
      must_not:
        - 使用 M2 复制竞品视觉语言
        - 逐像素复刻竞品页面

  - id: cross-platform-reference-remap
    input: 用户提供自己的淘宝详情长图，希望迁移到 Amazon US 和 Shopify。
    expected:
      must:
        - 复用一次参考语义分段和视觉抽象
        - 为 Amazon US 和 Shopify 建立独立 platform_migrations
        - 由目标平台规则覆盖来源页面比例、模块数和叠字方式
        - 分别交给 sku-amazon 和 sku-shopify
      must_not:
        - 直接复制淘宝长图尺寸和页面顺序
        - 切换平台时覆盖另一平台的迁移状态

  - id: resume-reference-migration
    input: 权威 SKU_CONTEXT 已保存参考分段、模块映射、三个迁移方向和已批准方向，生产在第二个目标单元中断。
    expected:
      must:
        - 读取已有 REFERENCE_MIGRATION_CONTEXT
        - 复用批准的模块映射和迁移方向
        - 从未完成目标单元继续
      must_not:
        - 重新切分参考长图
        - 重新生成迁移方向

  - id: missing-reference-migration-skill
    input: 用户上传参考详情页并要求迁移，但 sku-reference-migration 没有安装。
    expected:
      must:
        - 报告缺失的 sku-reference-migration
        - 给出安装或恢复建议
      must_not:
        - 在 Agent 或路由器中模拟完整 M1/M2/M3 迁移协议
        - 假装参考页已经完成模块映射

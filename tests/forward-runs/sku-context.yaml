sku_context_version: 2
product_identity:
  category: sunglasses
  product_name: null
  source_images: [front.jpg, side.jpg, hinge.jpg, package.jpg]
  source_image_roles: [front identity, side identity, hinge detail, packaging evidence]
  view_confidence:
    front: high
    side: high
    hinge: high
    hidden_back: unknown
  visible_structure: [black full-rim frame, two visible hinges]
  primary_colors: [black frame, dark lenses]
  included_items: []
  packaging: visible but included items are not verified
  logo_status: visible area must remain unchanged
facts:
  verified:
    - black full-rim frame is visible
    - dark lenses are visible
    - hinge and bridge geometry must remain unchanged
  cautious_inferences:
    - surface visually appears glossy
  prohibited_claims:
    - polarization
    - UV protection
    - certified eye protection
    - specific frame or lens material
  missing_evidence:
    - included-item list
    - dimensions
    - lens performance report
    - material specification
  evidence_sources: [front.jpg, side.jpg, hinge.jpg, package.jpg]
  claim_evidence_map: []
identity_contract:
  immutable_traits: [lens outline, bridge geometry, hinge, temple starting point, logo position, lens tint]
  bounded_traits: [new view only when supported by front and side evidence, environmental reflection cannot shift lens tint]
  unknown_traits: [hidden back structure, exact material]
  allowed_transformations: [scene, lighting, camera within view evidence, person, post-production graphics]
  prohibited_transformations: [frame redesign, lens recolor, invented hinge, moved logo, invented packaging]
  identity_landmarks: [lens outline, bridge, hinge, temple starting point, logo position, lens tint]
  variant_delivery_map: []
production:
  default_handling_mode: F1
  handling_reason: use F0 for strict slots, F1 for composites, and reviewed F2 for allowed creative slots
  creative_freedom_by_slot:
    strict_identity: {score: 0, mode: F0}
    controlled_detail: {score: 2, mode: F1}
    approved_lifestyle: {score: 3, mode: F2}
  tool_capabilities: [multi-image reference, mask, negative prompt]
  source_and_mask_plan: []
  allowed_edits: [background, lighting, natural contact shadow, layout-safe negative space]
  prohibited_edits: [frame geometry, lens color, hinge, bridge, logo, packaging text, included-item count]
  fidelity_requirements: [use real product cutout, compare every output to source images]
visual_memory_points:
  - point: continuous frame-to-temple transition
    product_evidence: side.jpg
    suitable_uses: [detail image, close-up module]
  - point: dark lens and black frame silhouette
    product_evidence: front.jpg
    suitable_uses: [main image, hero media]
  - point: visible hinge geometry
    product_evidence: hinge.jpg
    suitable_uses: [detail proof]
